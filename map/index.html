<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solar Projects — Israel</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --ink: #1a2332;
      --accent: #2f6fed;
      --panel: rgba(255, 255, 255, 0.92);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", "Heebo", Tahoma, sans-serif;
      color: var(--ink);
      background: #0e1624;
    }
    #map { width: 100%; height: 100%; }
    .panel {
      position: absolute;
      z-index: 1000;
      top: 12px;
      right: 12px;
      left: 12px;
      max-width: 420px;
      margin-inline-start: auto;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
    }
    .panel h1 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .panel p {
      margin: 0;
      font-size: 0.85rem;
      line-height: 1.4;
      opacity: 0.85;
    }
    .meta {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #445;
    }
    .leaflet-popup-content { direction: ltr; text-align: left; }
    .leaflet-marker-icon.company-marker {
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Solar Projects — Privacy Safe</h1>
    <p>
      נקודות לפי כתובת מ־Pipedrive. כאשר יש רק שם יישוב — הנקודה מפוזרת באזור מגורים
      (לא כתובת מדויקת).
    </p>
    <div class="meta" id="stats">טוען…</div>
  </div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map("map", {
      center: [31.5, 34.85],
      zoom: 8,
      minZoom: 7,
      maxZoom: 18,
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    // Soft focus on Israel
    map.setMaxBounds([
      [29.0, 33.5],
      [34.0, 36.5],
    ]);

    const companyIcon = L.icon({
      iconUrl: "marker-logo.png",
      iconRetinaUrl: "marker-logo-2x.png",
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -18],
      className: "company-marker",
    });

    fetch("data/projects.geojson?ts=" + Date.now())
      .then((r) => r.json())
      .then((geojson) => {
        const layer = L.geoJSON(geojson, {
          pointToLayer: (feature, latlng) =>
            L.marker(latlng, { icon: companyIcon }),
          onEachFeature: (feature, layer) => {
            layer.bindPopup("<strong>פרויקט סולארי</strong>");
          },
        }).addTo(map);

        const n = (geojson.features || []).length;
        document.getElementById("stats").textContent =
          n + " projects on map";

        if (n > 0) {
          try {
            map.fitBounds(layer.getBounds().pad(0.08));
          } catch (_) {}
        }
      })
      .catch((err) => {
        document.getElementById("stats").textContent =
          "Failed to load projects.geojson";
        console.error(err);
      });
  </script>
</body>
</html>
