name: Sync Pipedrive Israel map

on:
  schedule:
    # Sunday-Thursday 06:00 UTC ~ 09:00 Israel (IDT, UTC+3)
    - cron: "0 6 * * 0-4"
  workflow_dispatch:
    inputs:
      mode:
        description: "full = rescan missing; incremental = new only"
        required: true
        default: incremental
        type: choice
        options:
          - incremental
          - full
      limit:
        description: "Optional max new points (empty = no limit)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-map
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        id: sync
        continue-on-error: true
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          PIPEDRIVE_COMPANY_DOMAIN: ${{ secrets.PIPEDRIVE_COMPANY_DOMAIN }}
          USER_AGENT: pipedrive-israel-map/1.0 (github-actions)
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          LIMIT="${{ github.event.inputs.limit }}"
          ARGS="--${MODE}"
          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          echo "Running: python -m src.sync $ARGS"
          python -m src.sync $ARGS

      - name: Commit updated map data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json map/data/projects.geojson
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: sync Pipedrive projects to map"
            git push
          fi

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload map artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: map

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4

      - name: Fail job if sync failed
        if: steps.sync.outcome == 'failure'
        run: |
          echo "Sync failed — check logs above. Map was still deployed if possible."
          exit 1
